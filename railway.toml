[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node src/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Non-sensitive defaults — set secrets in Railway Dashboard > Variables
[variables]
NODE_ENV = "production"
SESSION_TYPE = "multifile"
LOG_LEVEL = "info"
PORT = "3000"
NIXPACKS_NODE_VERSION = "20"
# Secrets to add in Railway Dashboard:
# PHONE_NUMBER
# GROQ_API_KEY
# HF_TOKEN
# GITHUB_PERSONAL_ACCESS_TOKEN
# PUSH_SECRET
