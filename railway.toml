[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node src/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Non-sensitive defaults — set secrets in Railway Dashboard > Variables
[variables]
NODE_ENV = "production"
SESSION_TYPE = "multifile"
LOG_LEVEL = "info"
PORT = "3000"
# Secrets to add in Railway Dashboard:
# PHONE_NUMBER    (required — your WhatsApp number with country code, e.g. 233533416608)
# GROQ_API_KEY    (optional — AI chat features)
# HF_TOKEN        (optional — image generation)
# GITHUB_PERSONAL_ACCESS_TOKEN  (optional — .push command)
# PUSH_SECRET     (optional — secure the /push endpoint)
