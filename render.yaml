services:
  - type: web
    name: yuzuki-md
    runtime: node
    buildCommand: npm ci
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: PHONE_NUMBER
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
    disk:
      name: yuzuki-data
      mountPath: /app/bot_session
      sizeGB: 1
