app = "yuzuki-md"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  LOG_LEVEL = "info"
  PORT = "3000"
  SESSION_TYPE = "multifile"
  # Secrets below must be set via: fly secrets set KEY=value
  # PHONE_NUMBER=...
  # GROQ_API_KEY=...
  # HF_TOKEN=...
  # OPENAI_API_KEY=...
  # ANTHROPIC_API_KEY=...
  # GEMINI_API_KEY=...
  # GITHUB_PERSONAL_ACCESS_TOKEN=...
  # PUSH_SECRET=...

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Persistent volume for WhatsApp session files
[[mounts]]
  source = "yuzuki_session"
  destination = "/app/bot_session"

# Persistent volume for settings, database, and group data
[[mounts]]
  source = "yuzuki_data"
  destination = "/app/data"
