app = "yuzuki-md"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  LOG_LEVEL = "info"
  PORT = "3000"
  SESSION_TYPE = "multifile"
  NODE_ENV = "production"
  # Secrets must be set via: fly secrets set KEY=value
  # Required:
  #   fly secrets set PHONE_NUMBER=233533416608
  # Optional:
  #   fly secrets set GROQ_API_KEY=gsk_...
  #   fly secrets set HF_TOKEN=hf_...
  #   fly secrets set GITHUB_PERSONAL_ACCESS_TOKEN=ghp_...
  #   fly secrets set PUSH_SECRET=your_secret

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Persistent volume for WhatsApp session files
[[mounts]]
  source = "yuzuki_session"
  destination = "/app/bot_session"

# Persistent volume for settings, database, and group data
[[mounts]]
  source = "yuzuki_data"
  destination = "/app/data"
